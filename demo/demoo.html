<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chic Threads - Home</title>
    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header and Navigation Bar -->
    <header>
        <nav class="navbar">
            <div class="logo">[Chic Threads]</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Men's</a></li>
                <li><a href="#">Women's</a></li>
                <li><a href="#">Sale</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Area / Hero Section -->
    <main>
        <section class="hero-section">
            <h1>Elevate Your Style</h1>
            <p>Discover our latest collection of premium clothing</p>
            <a href="#" class="cta-button">Shop Now</a>
        </section>

        <!-- Featured Products Section -->
        <section class="featured-products">
            <h2>Featured Products</h2>
            <div class="product-grid">
                <!-- Product Card 1 -->
                <div class="product-card">
                    <img src="https://via.placeholder.com" alt="Product 1">
                    <h3>Stylish T-Shirt</h3>
                    <p class="price">$29.99</p>
                    <button>Add to Cart</button>
                </div>
                <!-- Product Card 2 -->
                <div class="product-card">
                    <img src="https://via.placeholder.com" alt="Product 2">
                    <h3>Denim Jeans</h3>
                    <p class="price">$59.99</p>
                    <button>Add to Cart</button>
                </div>
                <!-- Product Card 3 -->
                <div class="product-card">
                    <img src="https://via.placeholder.com" alt="Product 3">
                    <h3>Summer Dress</h3>
                    <p class="price">$45.50</p>
                    <button>Add to Cart</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Chic Threads. All rights reserved.</p>
    </footer>

</body>
</html>
